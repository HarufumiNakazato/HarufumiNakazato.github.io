name: Quantum Stock Auto Post

on:
  schedule:
    # 毎週月〜金 JST 8:00 (UTC 23:00 前日) に実行
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Xに投稿しない)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # posted_hashes.json をコミットするため

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements_poster.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements_poster.txt

      - name: Run quantum stock poster
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/quantum_stock_poster.py

      - name: Commit updated hashes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/posted_hashes.json
          git diff --staged --quiet || git commit -m "chore: update quantum post hashes [skip ci]"
          git push
