    # ParameterExtractor → LLM
    - data:
        isInLoop: false
        sourceType: parameter-extractor
        targetType: llm
      id: 1768370485830-source-1768833222540-target
      source: '1768370485830'
      sourceHandle: source
      target: '1768833222540'
      targetHandle: target
      type: custom
      zIndex: 0
    # LLM → Code
    - data:
        isInLoop: false
        sourceType: llm
        targetType: code
      id: 1768833222540-source-1768372229204-target
      source: '1768833222540'
      sourceHandle: source
      target: '1768372229204'
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    # -----------------------------------------------------------------------
    # ノード1: 開始
    # -----------------------------------------------------------------------
    - data:
        selected: false
        title: 開始
        type: start
        variables:
        - default: ''
          hint: ''
          label: prompt
          max_length: 50000
          options: []
          placeholder: ''
          required: true
          type: paragraph
          variable: prompt
      height: 108
      id: '1764056626699'
      position:
        x: 0
        y: 14
      positionAbsolute:
        x: 0
        y: 14
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    # -----------------------------------------------------------------------
    # ノード2: パラメータ抽出
    # -----------------------------------------------------------------------
    - data:
        model:
          completion_params:
            temperature: 0.7  # ★カスタマイズ: temperature
          mode: chat
          name: gpt-4.1-mini  # ★カスタマイズ: モデル名
          provider: langgenius/azure_openai/azure_openai  # ★カスタマイズ: プロバイダー
        # ===================================================================
        # ★カスタマイズ: 抽出するパラメータを自業務に合わせて定義
        # 各パラメータの name, description, type, required を設定
        # ===================================================================
        parameters:
        - description: '"契約者（甲）お客様名（書面用）"の値を代入してください。'  # ★カスタマイズ
          name: company_name  # ★カスタマイズ
          required: true
          type: string
        - description: '"書面審査結果"の値が"承認"であれば"completed"、"差戻し"であれば"returned"となります。'  # ★カスタマイズ
          name: system_status  # ★カスタマイズ
          required: true
          type: string
        - description: '"書面チェック結果"に書かれている、判断理由を示した文章です。書面審査結果が"承認"の場合は何も代入せず、""としてください。'  # ★カスタマイズ
          name: decision_reason  # ★カスタマイズ
          required: false
          type: string
        - description: '"契約番号"の値です。'  # ★カスタマイズ
          name: contract_number  # ★カスタマイズ
          required: false
          type: string
        - description: '"案件番号"の値です。"案件番号"が存在しない場合は12345678を代入してください。'  # ★カスタマイズ
          name: case_number  # ★カスタマイズ
          required: false
          type: string
        - description: >-  # ★カスタマイズ: メタデータ抽出ロジック全体を書き換え
            はじめに、パラメータを抽出する対象となるテキストデータのフォーマットを説明します。

            ■差戻しコメントID
            ・差戻しコメントID
            ・フロー種別判定フラグ
            ・NGと判断された理由

            ■チェック項目ID
            ・チェック項目ID
            ・フロー種別判定フラグ
            ・NGと判断された理由

            次に、下記の情報をそれぞれ特定してください。

            ・flow_type("document_check"または"data_verification")
            ・差戻しコメントID
            ・上記差戻しコメントIDと対応するチェック項目ID
            ・NGと判断された理由

            値は下記のフォーマットで出力してください。
            "■差戻しコメントID"や"■チェック項目ID"が複数ある場合は、Pythonのリストに準じて追記してください。

            [(flow_type,差戻しコメントID,チェック項目ID,AI判断理由),]

            ※複数ある場合の例
            [(flow_type,差戻しコメントID,チェック項目ID,AI判断理由), (flow_type,差戻しコメントID,チェック項目ID,AI判断理由),
            (flow_type,差戻しコメントID,チェック項目ID,AI判断理由),]
          name: metadata_list  # ★カスタマイズ
          required: true
          type: array[string]
        query:
        - '1764056626699'
        - prompt
        reasoning_mode: prompt
        selected: false
        title: パラメータ抽出  # ★カスタマイズ: ノードタイトル
        type: parameter-extractor
        vision:
          enabled: false
      height: 87
      id: '1768370485830'
      position:
        x: 342
        y: 21
      positionAbsolute:
        x: 342
        y: 21
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    # -----------------------------------------------------------------------
    # ノード3: LLM (metadata生成)
    # -----------------------------------------------------------------------
    - data:
        context:
          enabled: false
          variable_selector: []
        model:
          completion_params:
            temperature: 0.7  # ★カスタマイズ: temperature
          mode: chat
          name: gpt-4.1-mini  # ★カスタマイズ: モデル名
          provider: langgenius/azure_openai/azure_openai  # ★カスタマイズ: プロバイダー
        prompt_template:
        - id: 6f84523b-c8b1-4a5e-a53a-e66d5c89e38c
          role: system
          # =================================================================
          # ★カスタマイズ: メタデータ生成プロンプト全体を自業務に合わせて書き換え
          # 抽出パラメータから外部API用のJSONペイロードを生成するロジック
          # =================================================================
          text: >-
            {{#1768370485830.metadata_list#}}参照して、下記のJSON文字列を出力してください。

            "flow_type"が"document_check"であれば、下記フォーマットの"document_check"の"metadata"タブに情報を追記します。

            "flow_type"が"data_verification"であれば、下記フォーマットの"data_verification"の"metadata"タブに情報を追記します。

            **下記のフォーマットに書かれていないこと、例えば"[]"などは絶対に出力しないでください。**

            {
              flow_type: "document_check",
              process_status: "{{#1768370485830.system_status#}}",
              metadata: [{
                check_list_id: {チェック項目ID},
                comment_id: {差戻しコメントID},
                decision_reason: "{AI判断理由}"
              }]
            },
            {
              flow_type: "data_verification",
              process_status: "{{#1768370485830.system_status#}}",
              metadata: [{
                check_list_id: {チェック項目ID},
                comment_id: {差戻しコメントID},
                decision_reason: "{AI判断理由}"
              }]
            }

            {{#1768370485830.metadata_list#}}を参照した結果、flow_typeに"document_check"がない場合は、"document_check"のJSON文字列を下記のように書き換えてください。
            {
              flow_type: "document_check",
              process_status: "completed",
              metadata: [],
            }

            また、{{#1768370485830.metadata_list#}}を参照した結果、flow_typeに"data_verification"がない場合は、"data_verification"のJSON文字列を下記のように書き換えてください。
            {
              flow_type: "data_verification",
              process_status: "completed",
              metadata: [],
            }
        selected: false
        title: metadata生成  # ★カスタマイズ: ノードタイトル
        type: llm
        vision:
          enabled: false
