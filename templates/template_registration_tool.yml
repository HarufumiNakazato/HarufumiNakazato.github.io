      selected: false
      source: '1768371463899'
      sourceHandle: source
      target: '1764056650131'
      targetHandle: target
      type: custom
      zIndex: 0
    # Code → HTTP POST
    - data:
        isInLoop: false
        sourceType: code
        targetType: http-request
      id: 1768372229204-source-1768371463899-target
      selected: false
      source: '1768372229204'
      sourceHandle: source
      target: '1768371463899'
      targetHandle: target
      type: custom
