            value: "\t{\n\t\tcompany_name: \"{{#1768370485830.company_name#}}\",\n\
              \t\tdocument_type: \"review\",\n\t\tidentifiers: [\n\t\t\t{\n\t\t\t\t\
              identifier_type: \"case_number\",\n\t\t\t\tidentifier_value: \"{{#1768370485830.case_number#}}\"\
              \n\t\t\t},\n\t\t\t{\n\t\t\t\tidentifier_type: \"contract_number\",\n\
              \t\t\t\tidentifier_value: \"{{#1768370485830.contract_number#}}\"\n\t\
              \t\t}\n\t\t],\n\t\tsearch_condition_id: 1,\n\t\tsystem_status: \"{{#1768370485830.system_status#}}\"\
              ,\n\t\trequested_at: \"{{#1768372229204.now_datetime#}}\",\n\t\tstart_at:\
              \ 2025-12-18 13:00:00,\n\t\tend_at: 2025-12-18 13:20:00,\n\t\tdetails:\
              \ [{{#1768833222540.text#}}]\n\t}"
          type: json
        headers: ''
