    - data:
        code: "from datetime import datetime\nfrom zoneinfo import ZoneInfo\n\ndef\
          \ main():\n    now_datetime = str(datetime.now(ZoneInfo(\"Asia/Tokyo\")))\n\
          \    return {\n        \"now_datetime\": now_datetime,\n    }"
        code_language: python3
