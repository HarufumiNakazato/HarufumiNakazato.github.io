# =============================================================================
# テンプレート: 結果登録ツール
# =============================================================================
# パターン: Start → ParameterExtractor → LLM → Code → HTTP POST → End (5ノード)
# 用途:     処理結果からパラメータを抽出し、メタデータを生成して外部APIに登録する
# 適用例:   審査結果のDB登録、検査結果の外部システム連携、ワークフロー完了通知
# =============================================================================
# ★カスタマイズ箇所は「# ★カスタマイズ:」コメントで示しています。
# サンプル値は書面審査業務のものです。自業務の値に差し替えてください。
# =============================================================================
app:
  description: ''
  icon: "\U0001F916"
  icon_background: '#FFEAD5'
  mode: workflow
  name: BPaaS_書面審査結果登録ツール  # ★カスタマイズ: ツール名
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/azure_openai:0.0.36@c995a18ffe376b9995b88ad91930998b2b4f9f6e02ef6280895ff8a175e0cb8b  # ★カスタマイズ: LLMプロバイダー
    version: null
kind: app
version: 0.5.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
