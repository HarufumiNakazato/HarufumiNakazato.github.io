# =============================================================================
# 業務ロジック定義ファイル: 書面審査業務
# =============================================================================
# このファイルは業務固有のロジックを一箇所に集約したものです。
# 新しい業務に適用する場合は、このファイルをコピーして値を書き換え、
# 各テンプレートYMLの「★カスタマイズ」箇所に転記してください。
# =============================================================================

business_name: "書面審査業務"
description: "企業間の契約に際しての書面審査を自動化する業務"

# ---------------------------------------------------------------------------
# 入力データスキーマ (JSON フォーマット定義)
# ---------------------------------------------------------------------------
input_schema: |
  {
      "契約書一覧照会": [
          { "契約書名": "{value}" }
      ],
      "基本情報タブ": {
          "契約者（甲）お客様名（書面用）": "{value}",
          "契約者（甲）お客様名": "{value}",
          "契約者（甲）住所": "{value}",
          "契約者（甲）氏名": "{value}",
          "契約者（乙）住所": "{value}",
          "契約者（乙）会社名（書面用）": "{value}",
          "契約者（乙）組織名": "{value}",
          "契約者（乙）役職": "{value}",
          "契約者（乙）契約者氏名": "{value}",
          "契約者（乙）担当者氏名": "{value}"
      },
      "取引明細タブ": [
          {
              "NO.": "{value}",
              "商品名": "{value}",
              "商品コード": "{value}",
              "数量": "{value}",
              "税抜金額（円）": "{value}"
          }
      ],
      "回収条件・請求先情報": {
          "商品明細一覧": [
              {
                  "回収条件NO.": "{value}",
                  "回収条件": {
                      "回収条件NO.": "{value}",
                      "請求先名": "{value}"
                  },
                  "支払区分": {
                      "支払区分": "{value}",
                      "支払方法": "{value}",
                      "支払期日": "{value}"
                  }
              }
          ]
      },
      "ファイル情報": [
          {
              "署名付きURL": "{value}",
              "画像ファイル名": "{value}"
          }
      ],
      "契約番号": "{value}",
      "案件番号": "{value}",
      "基本契約": "{value}",
      "契約締結日（注文日）": "{value}"
  }

# ---------------------------------------------------------------------------
# チェック観点 (注文書チェックツールで使用)
# ---------------------------------------------------------------------------
check_criteria:
  - id: 1
    name: "書面種別判定"
    rule: |
      "■書面種別判定結果"に記載されている書面種別に"注文書"が含まれていない場合、"添付書類相違"でNG。
      "■書面種別判定結果"に記載されている結果が"書面未添付"の場合、"書面未添付"でNG。
    blocking: true  # この項目がNGの場合、以下のチェックは実施しない
  - id: 2
    name: "契約日（注文日）"
    rule: "発注書画像の日付と一致しているか。発注書画像に注文日が未記載の場合はNG。"
  - id: 3
    name: "受注企業名"
    rule: "発注書画像について、企業名が省略されず記載されており、突合用データと一致しているか"
  - id: 4
    name: "品目"
    rule: "発注書画像について、品目が明記されており、突合用データと一致しているか。また、白物家電の場合は販売不可なので、品目が白物家電にあたらないこと。"
  - id: 5
    name: "数量"
    rule: "発注書画像について、数量が明記されており、突合用データと一致しているか"
  - id: 6
    name: "発注金額"
    rule: "発注書画像について、発注金額が明記されており、突合用データと一致しているか。基本契約なしかつ受注額100万円以上の場合はNG。金額が一致していない場合もNG。"
  - id: 7
    name: "押印"
    rule: "取引先の押印がされているか。されていればOK、されていなければNG"
  - id: 8
    name: "担当者名"
    rule: "社判を押印した企業の担当者名がフルネームで記載されていること。フルネームでなければNG。社判を押印していない企業の担当者名についてはチェック不要。"

# ---------------------------------------------------------------------------
# 差戻しコメント一覧 (ID: コメント文)
# 承認・差戻しツール / 注文書チェックツール で共通使用
# ---------------------------------------------------------------------------
return_comments:
  1: "書面が未添付です。添付いただき、再申請して下さい。"
  2: "注文書の(控)・(仮)が添付されていますので、「手配可の差戻し」とします。正式な注文書を入手次第、再申請して下さい。"
  3: "広域・ＢＰ業務Ｇ（広域顧客営業協力制度担当）の正式な納入依頼書が未添付です。添付いただき、再申請して下さい。"
  4: "「手配可の差戻し」としますが、○○を入手次第、再申請して下さい。"
  5: "【地紋印刷画像】"
  6: "起案書DBリンクがされておりません。Notesの起案書DBリンクを審査データへ添付して、審査依頼をして下さい。"
  7: "注文書に『注文日』が未記載です。再申請頂く際は記載頂いた日付とＶ－ＵＰデータ契約締結日（注文日）が一致している事を確認して下さい。"
  8: "注文書の『お客様会社名』が未記載です。記載していただき、再申請して下さい。"
  9: "注文書の『お客様氏名の欄』が未記載です。決裁権限者・ご担当者の氏名を『フルネーム』で記載していただき、再申請して下さい。"
  10: "注文書にお客様捺印(代表者印/個人印)がありません。押印していただき、再申請して下さい。※シャチハタ印は不可となります。"
  11: "分割審査は不可となっております。V-UPデータは注文書通り作成下さい。発注を分けられるようであれば、契約審査完了後に分けて下さい。"
  12: "『契約金額』が『注文書』と『V-UPデータ/契約金額』で不一致です。"
  13: "『単価金額』が『注文書』と『V-UPデータ/金額』で不一致です。"
  14: "注文書とV-UPデータの『お客様名』が不一致です。（データの「請求先名」は『○○○』です）"
  15: "書面とV-UPデータの商品明細が不一致です。"
  16: "商品の一致が確認出来ません。同一商品で間違い無いようであればV-UPコメント欄に「同一商品です」と入力いただき再度審査をご依頼下さい。"
  17: "代替・終息コメントにより、「手配可の差戻し」としますが、売上までに契約書面を取り直し、もしくは訂正いただき、再申請して下さい。"
  18: "数量が、『注文書』と『V-UPデータ』で不一致です。"
  19: "『支払条件（期日/方法）』が、『注文書』と『V-UP回収条件/支払条件（期日/方法）』で不一致です。"
  20: "V-UP回収条件が未入力です。入力いただき、再申請して下さい。"
  21: "基本契約「無」ユーザーです。売買契約書を取得し、『売買契約書』表紙で再申請して下さい。"

# ---------------------------------------------------------------------------
# 差戻しコメントのカテゴリ分類 (承認・差戻しツールで使用)
# ---------------------------------------------------------------------------
return_comment_categories:
  - category: "書面未着：添付書面不備"
    comment_ids: [1, 2, 3, 4]
  - category: "書面：注文日-無/不備"
    comment_ids: [7]
  - category: "書面：甲)会社名（EU）-不備"
    comment_ids: [8]
  - category: "書面：甲)役職者名or担当者名-無"
    comment_ids: [9]
  - category: "書面：お客様契約印-不備"
    comment_ids: [10]
  - category: "ﾃﾞｰﾀ不一致：契約金額(税抜)"
    comment_ids: [11, 12, 13]
  - category: "ﾃﾞｰﾀ不一致：甲)会社名(EU)"
    comment_ids: [14]
  - category: "ﾃﾞｰﾀ不一致：(明細)商品名"
    comment_ids: [15, 16, 17]
  - category: "ﾃﾞｰﾀ不一致：数量"
    comment_ids: [18]
  - category: "ﾃﾞｰﾀ不一致：支払条件"
    comment_ids: [19, 20]
  - category: "100万円以上：注文書受注不可"
    comment_ids: [21]

# ---------------------------------------------------------------------------
# チェック項目一覧 (ID: 項目名)
# ---------------------------------------------------------------------------
check_items:
  1: "書面未着：添付書面不備"
  2: "書面未着：表紙不備"
  3: "書面：注文日-無/不備"
  4: "書面：甲)会社名（EU）-不備"
  5: "書面：甲)役職者名or担当者名-無"
  6: "書面：お客様契約印-不備"
  7: "ﾃﾞｰﾀ不一致：契約金額(税抜)"
  8: "ﾃﾞｰﾀ不一致：甲)会社名(EU)"
  9: "ﾃﾞｰﾀ不一致：(明細)商品名"
  10: "ﾃﾞｰﾀ不一致：数量"
  11: "ﾃﾞｰﾀ不一致：支払条件"
  12: "100万円以上：注文書受注不可"

# ---------------------------------------------------------------------------
# フロー種別マッピング
# ---------------------------------------------------------------------------
flow_type_mapping:
  document_check: [1, 2, 3, 4, 5, 6, 12]
  data_verification: [7, 8, 9, 10, 11]

# ---------------------------------------------------------------------------
# パラメータ抽出定義 (結果登録ツール用)
# ---------------------------------------------------------------------------
extraction_parameters:
  - name: "company_name"
    description: '"契約者（甲）お客様名（書面用）"の値を代入してください。'
    required: true
  - name: "system_status"
    description: '"書面審査結果"の値が"承認"であれば"completed"、"差戻し"であれば"returned"となります。'
    required: true
  - name: "decision_reason"
    description: '"書面チェック結果"に書かれている、判断理由を示した文章です。書面審査結果が"承認"の場合は何も代入せず、""としてください。'
    required: false
  - name: "contract_number"
    description: '"契約番号"の値です。'
    required: false
  - name: "case_number"
    description: '"案件番号"の値です。"案件番号"が存在しない場合は12345678を代入してください。'
    required: false

# ---------------------------------------------------------------------------
# 外部API設定
# ---------------------------------------------------------------------------
external_api:
  endpoint: "https://external.rsi-bpaas-dev.rinfra.ricoh.com/process"
  method: "post"
  retry:
    max_retries: 3
    retry_interval: 100

# ---------------------------------------------------------------------------
# モデル設定
# ---------------------------------------------------------------------------
model:
  name: "gpt-4.1-mini"
  provider: "langgenius/azure_openai/azure_openai"
  temperature: 0.7
