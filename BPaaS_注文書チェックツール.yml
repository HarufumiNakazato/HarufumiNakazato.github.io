        - id: d7717af8-4219-4fd9-87c6-de83e1cb53d1
          role: system
          text: "※出力は必ず日本語のみで行い、中国語・英語の語彙は使用しない。\n\nあなたに共有した画像は発注書です。\n\n{{#1759465438674.prompt#}}は発注書の内容が正しいことを確認するための突合用データです。\n\
            {{#1759465438674.prompt#}}は下記のような構造になっていますので、対応する値を参照してください。\n\n{\n  \
            \  \"契約書一覧照会\": [\n        {\n            \"契約書名\": \"{value}\"\n    \
            \    }\n    ],\n    \"基本情報タブ\": {\n        \"契約者（甲）お客様名（書面用）\": \"{value}\"\
            ,\n        \"契約者（甲）お客様名\": \"{value}\",\n        \"契約者（甲）住所\": \"{value}\"\
            ,\n        \"契約者（甲）氏名\": \"{value}\",\n        \"契約者（乙）住所\": \"{value}\"\
            ,\n        \"契約者（乙）会社名（書面用）\": \"{value}\",\n        \"契約者（乙）組織名\": \"\
            {value}\",\n        \"契約者（乙）役職\": \"{value}\",\n        \"契約者（乙）契約者氏名\"\
            : \"{value}\",\n        \"契約者（乙）担当者氏名\": \"{value}\"\n    },\n    \"取引明細タブ\"\
            : [\n        {\n            \"NO.\": \"{value}\",\n            \"商品名\"\
            : \"{value}\",\n            \"商品コード\": \"{value}\",\n            \"数量\"\
            : \"{value}\",\n            \"税抜金額（円）\": \"{value}\"\n        }\n    ],\n\
            \    \"回収条件・請求先情報\": {\n        \"商品明細一覧\": [\n            {\n       \
            \         \"回収条件NO.\": \"{value}\",\n                \"回収条件\": {\n   \
            \                 \"回収条件NO.\": \"{value}\",\n                    \"請求先名\"\
            : \"{value}\"\n                },\n                \"支払区分\": {\n     \
            \               \"支払区分\": \"{value}\",\n                    \"支払方法\":\
            \ \"{value}\",\n                    \"支払期日\": \"{value}\"\n          \
            \      }\n            }\n        ]\n    },\n    \"ファイル情報\": [\n\t{\n\t\
            \        \"署名付きURL\": \"{value}\",\n\t        \"画像ファイル名\": \"{value}\"\
            \n\t}\n    ],\n    \"契約番号\": \"{value}\",\n    \"案件番号\": \"{value}\",\n\
            \    \"基本契約\": \"{value}\",\n    \"契約締結日（注文日）\": \"{value}\"\n}\n\n発注書の画像を確認して、下記の観点で各項目を確認してください。\n\
            \n・\"■書面種別判定結果\"に記載されている書面種別に\"注文書\"が含まれていない場合、”添付書類相違”でNG。\n\n・\"■書面種別判定結果\"\
            に記載されている結果が\"書面未添付\"の場合、\"書面未添付\"でNG。\n\n**\"書面未添付\"もしくは\"添付書面相違\"の場合、以下のチェックは実施しないでください**\n\
            **チェックを実施しないことの報告は不要です**\n\n・契約日（注文日）: 発注書画像の日付と一致しているか。発注書画像に注文日が未記載の場合はNG。\n\
            ・受注企業名: 発注書画像について、企業名が省略されず記載されており、突合用データと一致しているか\n・品目: 発注書画像について、品目が明記されており、突合用データと一致しているか。また、白物家電の場合は販売不可なので、品目が白物家電にあたらないこと。\n\
            ・数量: 発注書画像について、数量が明記されており、突合用データと一致しているか\n・発注金額: 発注書画像について、発注金額が明記されており、突合用データと一致しているか。基本契約なしかつ受注額100万円以上の場合はNG。金額が一致していない場合もNG。\n\
            ・押印: 取引先の押印がされているか。されていればOK、されていなければNG\n・担当者名: **社判を押印した企業の担当者名**がフルネームで記載されていること。フルネームでなければNG。**社判を押印していない企業の担当者名**についてはチェック不要。\n\
            \nただし、契約番号については突合不要です。\n\n**差戻し事項があると判断した場合は、その点について必ずファクトチェックを実施してください。**\n\
            \n確認結果は下記のフォーマットで出力してください。\n\n承認の際は、\"概ね問題ない\"では足りず、\"完全に問題ない\"ことが必要です。\n\
            \"問題あり\"か\"問題なし\"かの二択に限られることに注意してください。\n特に、突合時において少しでも差異がある場合、NGとしてください。\n\
            \n---------------------------------------------------------\n■ ツール実行結果\n\
            ・正常終了の場合は\"SUCCESS\"、異常終了の場合は\"FAILED\"を出力\n\n■ 注文書チェック結果\n各項目を箇条書きにして、比較した値を明示したうえで相違の有無を出力してください。\n\
            NGの場合、その理由を明記してください。"
