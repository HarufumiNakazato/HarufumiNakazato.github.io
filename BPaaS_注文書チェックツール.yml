        prompt_template:
        - id: 3289fbd9-fc10-4bc4-ade8-90e33b23d57d
          role: system
          text: '下記は、差戻しコメントと、そのコメントに割り振られたIDの対応リストです。

            {{#1759465512279.text#}}は注文書チェックの結果です。

            注文書チェックの結果が差戻しである場合、差戻しの理由にに対応する差戻しコメントをリストから探し、**ID**を出力してください。

            また、フロー種別判定フラグとして、IDが1,2,3,4,5,6,12のいずれかの場合は"document_check"という文字列を併せて出力してください。

            IDが7,8,9,10,11のいずれかの場合は"data_verification"という文字列を出力してください。

            以下のフォーマットを遵守してください。

            複数ある場合は、その数の分だけ下記フォーマットを繰り返して出力してください。

            ------------------------------------------------------

            ■差戻しコメントID

            ・ID

            ・フロー種別判定フラグ

            ・NGと判断された理由

            ------------------------------------------------------

            **その他の文字列は出力しないでください。**


            注文書チェックの結果が承認である場合は何も出力しないでください。


            1:書面が未添付です。添付いただき、再申請して下さい。

            2:注文書の(控)・(仮)が添付されていますので、「手配可の差戻し」とします。正式な注文書を入手次第、再申請して下さい。

            3:広域・ＢＰ業務Ｇ（広域顧客営業協力制度担当）の正式な納入依頼書が未添付です。添付いただき、再申請して下さい。

            4:「手配可の差戻し」としますが、○○を入手次第、再申請して下さい。

            5:【地紋印刷画像】

            6:起案書DBリンクがされておりません。Notesの起案書DBリンクを審査データへ添付して、審査依頼をして下さい。

            7:注文書に『注文日』が未記載です。再申請頂く際は記載頂いた日付とＶ－ＵＰデータ契約締結日（注文日）が一致している事を確認して下さい。

            8:注文書の『お客様会社名』が未記載です。記載していただき、再申請して下さい。

            9:注文書の『お客様氏名の欄』が未記載です。決裁権限者・ご担当者の氏名を『フルネーム』で記載していただき、再申請して下さい。

            10:注文書にお客様捺印(代表者印/個人印)がありません。押印していただき、再申請して下さい。※シャチハタ印は不可となります。

            11:分割審査は不可となっております。V-UPデータは注文書通り作成下さい。発注を分けられるようであれば、契約審査完了後に分けて下さい。

            12:『契約金額』が『注文書』と『V-UPデータ/契約金額』で不一致です。

            13:『単価金額』が『注文書』と『V-UPデータ/金額』で不一致です。

            14:注文書とV-UPデータの『お客様名』が不一致です。（データの「請求先名」は『○○○』です）

            15:書面とV-UPデータの商品明細が不一致です。

            16:商品の一致が確認出来ません。同一商品で間違い無いようであればV-UPコメント欄に「同一商品です」と入力いただき再度審査をご依頼下さい。

            17:代替・終息コメントにより、「手配可の差戻し」としますが、売上までに契約書面を取り直し、もしくは訂正いただき、再申請して下さい。

            18:数量が、『注文書』と『V-UPデータ』で不一致です。

            19:『支払条件（期日/方法）』が、『注文書』と『V-UP回収条件/支払条件（期日/方法）』で不一致です。

            20:V-UP回収条件が未入力です。入力いただき、再申請して下さい。

            21:基本契約「無」ユーザーです。売買契約書を取得し、『売買契約書』表紙で再申請して下さい。

            '
