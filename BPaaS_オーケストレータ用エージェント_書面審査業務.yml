          query:
            type: constant
            value: '【全業務共通】

              次に、実施いただきたい処理を共有します。

              どのような作業が必要かを推論し、必要なツールの実行をお願いします。


              各ツールの実行結果は"result"という出力変数に格納されています。


              【各業務個別】

              ①BPaaS_書面審査結果登録ツールの入力変数"prompt"に下記フォーマットのテキストデータを渡して実行してください。


              **また、下記のフォーマットは必ず守ってください。守らないとツールが正常に動作しません。**


              ------------------------------------------------

              ・{{#1759458850378.prompt#}}をそのまま記載


              **※"{{#1759458850378.prompt#}}"を必ず記載してください。記載しないとツールが正常に動作しません。**


              ■ 書面チェック結果

              (書面チェックエージェントの実行結果を記載)

              **上記の文字列をそのまま出力するという旨の指示ではありません。書面チェックエージェントの実行結果を、要約や改変等せずにそのまま渡してください。**


              ■ 書面審査結果

              ・BPaaS_承認・差戻しツールの実行結果(承認or 差戻し)

              ・差戻しコメント(差戻しの場合のみ出力)

              ------------------------------------------------



              ②最終的な結果出力をしてください。今回の出力については、下記の項目に沿ってテキストデータ*のみ*出力してください。

              **あなたに対する指示であると解釈すべき文字列は出力しないでください**

              ------------------------------------------------

              ■ オーケストレータ処理結果

              ・正常終了の場合は"SUCCESS"、異常終了の場合は"FAILED"


              ※差戻しの場合でも、ツールが正常に終了していれば"SUCCESS"


              ■ 書面チェック結果

              (書面チェックエージェントの実行結果を記載)

              **上記の文字列をそのまま出力するという旨の指示ではありません。書面チェックエージェントの実行結果を、要約や改変等せずにそのまま出力してください。**


              ■ 書面審査結果

              ・BPaaS_承認・差戻しツールの実行結果(承認or 差戻し)

              ・差戻しコメント(差戻しの場合のみ出力)

              ------------------------------------------------'
